<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat Window — SKYNETchat</title>
  <link rel="stylesheet" href="../styles/main.css"/>
  <link rel="stylesheet" href="../styles/chat.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* Ensure the chat window looks like a modal panel on top of the app style */
    .chat-window {
      width: min(900px, 95%);
      height: 78vh;
      margin: 40px auto;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex; flex-direction: column;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .chat-window-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      background: var(--bg-secondary);
    }
    .chat-window-header h3 { margin: 0; font-size: 14px; font-weight: 700; color: var(--text-primary); }
    .chat-window-close { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 6px; border-radius: 6px; }
    .chat-window-close:hover { color: var(--text-primary); background: var(--bg-hover); }
    /* Reuse existing chat areas */
    #windowMessagesArea { padding: 0 0 24px; overflow-y: auto; min-height: 0; flex: 1; }
    #windowInputArea { padding: 12px 16px; border-top: 1px solid var(--border); }
  </style>
</head>
<body>
  <div class="chat-window" id="chatWindow">
    <div class="chat-window-header">
      <h3>SKYNETchat — Conversa</h3>
      <button class="chat-window-close" onclick="window.close()" title="Fechar janela">×</button>
    </div>
    <div class="messages-area" id="windowMessagesArea" style="flex:1; padding: 16px; overflow:auto;">
      <!-- Messages will be injected here -->
      <div class="welcome-screen" style="text-align:center; color:var(--text-muted); padding:20px;">
        Inicie a conversa Digite uma mensagem abaixo.
      </div>
    </div>
    <div id="windowInputArea" class="input-area" style="flex-shrink:0; padding: 8px 12px 14px;">
      <div class="input-container" style="border-radius: 8px;">
        <textarea id="windowMessageInput" class="message-input" placeholder="Mensagem para SKYNETchat..." rows="2" style="width:100%;"></textarea>
        <button class="send-btn" id="windowSendBtn" onclick="sendWindowMessage()" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script src="../js/chat_window.js"></script>
</body>
</html>
