<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Entrar — SKYNETchat</title>
  <link rel="stylesheet" href="../styles/main.css"/>
  <link rel="stylesheet" href="../styles/auth.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="auth-bg">
    <div class="auth-glow auth-glow-1"></div>
    <div class="auth-glow auth-glow-2"></div>
  </div>
  <div class="auth-container">
    <a href="../index.html" class="auth-brand">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <path d="M7 14 L14 7 L21 14 L14 21 Z" stroke="#00CFFF" stroke-width="2" fill="none"/>
        <circle cx="14" cy="14" r="3" fill="#00CFFF"/>
      </svg>
      <span>SKYNETchat</span>
    </a>
    <div class="auth-card">
      <div class="auth-header">
        <h1>Bem-vindo de volta</h1>
        <p>Entre na sua conta para continuar</p>
      </div>
      <!-- Google OAuth btn -->
      <button class="btn-social" id="googleBtn">
        <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/><path d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
        Continuar com Google
      </button>
      <div class="form-divider"><span>ou</span></div>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">E-mail</label>
          <input type="email" class="form-input" id="email" placeholder="seu@email.com" required />
        </div>
        <div class="form-group">
          <label class="form-label">
            Senha
            <a href="recovery.html" class="forgot-link">Esqueceu?</a>
          </label>
          <div class="input-wrap">
            <input type="password" class="form-input" id="password" placeholder="••••••••" required />
            <button type="button" class="input-eye" onclick="togglePass('password')">
              <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <div id="loginError" class="form-error" style="display:none;"></div>
        <button type="submit" class="form-submit" id="submitBtn">
          <span id="submitText">Entrar</span>
          <div id="submitSpinner" class="spinner" style="display:none;"></div>
        </button>
      </form>
      <p class="auth-footer">Não tem conta? <a href="signup.html">Criar conta grátis</a></p>
    </div>
  </div>
  <script src="../js/auth.js"></script>
  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById("submitBtn");
      const txt = document.getElementById("submitText");
      const spin = document.getElementById("submitSpinner");
      const err = document.getElementById("loginError");
      btn.disabled = true; txt.style.display = "none"; spin.style.display = "block";
      err.style.display = "none";
      await new Promise(r => setTimeout(r, 1200));
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      // Simula login com localStorage
      const users = JSON.parse(localStorage.getItem("sn_users") || "[]");
      const user = users.find(u => u.email === email && u.password === password);
      if (user || (email && password.length >= 6)) {
        const userData = user || { email, name: email.split("@")[0] };
        localStorage.setItem("sn_user", JSON.stringify(userData));
        window.location.href = "chat.html";
      } else {
        err.textContent = "E-mail ou senha inválidos.";
        err.style.display = "block";
        btn.disabled = false; txt.style.display = "block"; spin.style.display = "none";
      }
    }
    document.getElementById("googleBtn").onclick = function() {
      const fakeUser = { email: "usuario@gmail.com", name: "Usuário Google" };
      localStorage.setItem("sn_user", JSON.stringify(fakeUser));
      window.location.href = "chat.html";
    };
  </script>
</body>
</html>
